<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake - GlowGrid Arcade</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue:   #00d2ff;
            --neon-pink:   #ff0055;
            --neon-green:  #00ff88;
            --neon-purple: #bf00ff;
            --bg:          #080c18;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        .game-container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: var(--neon-green);
            text-shadow: 0 0 12px var(--neon-green), 0 0 40px rgba(0,255,136,0.3);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 20px;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .score-item {
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
        }

        .score-item span {
            color: #fff;
            font-weight: 700;
        }

        #gameCanvas {
            border: 3px solid var(--neon-green);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,255,136,0.3), inset 0 0 60px rgba(0,255,136,0.05);
            background: #0a0f1a;
            display: block;
        }

        .controls {
            margin-top: 20px;
            color: #667788;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .controls kbd {
            background: #1a2a4a;
            color: var(--neon-blue);
            padding: 4px 10px;
            border-radius: 4px;
            margin: 0 3px;
            font-family: 'Share Tech Mono', monospace;
            border: 1px solid var(--neon-blue);
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(8, 12, 24, 0.95);
            border: 2px solid var(--neon-green);
            border-radius: 12px;
            padding: 40px 60px;
            text-align: center;
            z-index: 10;
            display: none;
        }

        .overlay.active { display: block; }

        .overlay h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--neon-green);
            text-shadow: 0 0 12px var(--neon-green);
            margin-bottom: 15px;
        }

        .overlay p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #aabbcc;
        }

        .overlay button {
            background: var(--neon-green);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 12px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 4px 0 #008855;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .overlay button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #008855;
        }

        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }

        .mobile-controls button {
            background: var(--neon-blue);
            color: #000;
            border: none;
            border-radius: 8px;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #006699;
        }

        .mobile-controls button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #006699;
        }

        .dpad-row { display: flex; justify-content: center; gap: 10px; }
        .dpad-col { display: flex; flex-direction: column; gap: 10px; }

        @media (max-width: 600px) {
            .mobile-controls { display: block; }
            #gameCanvas { max-width: 95vw; max-height: 50vh; }
            h1 { font-size: 1.8rem; }
            .score-board { gap: 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Snake</h1>
        <div class="score-board">
            <div class="score-item">SCORE: <span id="score">0</span></div>
            <div class="score-item">BEST: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd>
        </div>

        <div class="mobile-controls">
            <div class="dpad-row">
                <div class="dpad-col">
                    <button data-dir="up">▲</button>
                    <button data-dir="down">▼</button>
                </div>
                <div class="dpad-col">
                    <button data-dir="left">◀</button>
                    <button data-dir="right">▶</button>
                </div>
            </div>
        </div>

        <div class="overlay" id="startOverlay">
            <h2>SNAKE</h2>
            <p>Eat food to grow. Don't hit walls or yourself!</p>
            <button id="startBtn">START</button>
        </div>

        <div class="overlay" id="gameOverOverlay">
            <h2>GAME OVER</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snake_best') || 0;
        let gameLoop;
        let gameRunning = false;
        let lastDir = {x: 0, y: 0};

        highScoreEl.textContent = highScore;

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (subtle)
            ctx.strokeStyle = '#1a2a4a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw food
            ctx.fillStyle = '#ff0055';
            ctx.shadowColor = '#ff0055';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw snake
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    0,
                    segment.x * gridSize + gridSize/2,
                    segment.y * gridSize + gridSize/2,
                    gridSize/2
                );
                if (index === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    gradient.addColorStop(0, '#00cc6a');
                    gradient.addColorStop(1, '#009950');
                }
                ctx.fillStyle = gradient;
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = index === 0 ? 20 : 10;
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
            ctx.shadowBlur = 0;
        }

        function update() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                placeFood();
            } else {
                snake.pop();
            }

            lastDir = {x: dx, y: dy};
        }

        function placeFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
                valid = true;
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snake_best', highScore);
                highScoreEl.textContent = highScore;
            }
            finalScoreEl.textContent = score;
            gameOverOverlay.classList.add('active');
        }

        function startGame() {
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            lastDir = {x: 1, y: 0};
            score = 0;
            scoreEl.textContent = score;
            placeFood();
            gameRunning = true;
            startOverlay.classList.remove('active');
            gameOverOverlay.classList.remove('active');
            clearInterval(gameLoop);
            gameLoop = setInterval(() => {
                update();
                draw();
            }, 130);
        }

        function handleKeydown(e) {
            if (!gameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (lastDir.y !== 1) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (lastDir.y !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (lastDir.x !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (lastDir.x !== -1) { dx = 1; dy = 0; }
                    break;
            }
        }

        // Mobile controls
        document.querySelectorAll('.mobile-controls button').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const dir = btn.dataset.dir;
                if (!gameRunning) return;
                if (dir === 'up' && lastDir.y !== 1) { dx = 0; dy = -1; }
                if (dir === 'down' && lastDir.y !== -1) { dx = 0; dy = 1; }
                if (dir === 'left' && lastDir.x !== 1) { dx = -1; dy = 0; }
                if (dir === 'right' && lastDir.x !== -1) { dx = 1; dy = 0; }
            });
            btn.addEventListener('click', (e) => {
                const dir = btn.dataset.dir;
                if (!gameRunning) return;
                if (dir === 'up' && lastDir.y !== 1) { dx = 0; dy = -1; }
                if (dir === 'down' && lastDir.y !== -1) { dx = 0; dy = 1; }
                if (dir === 'left' && lastDir.x !== 1) { dx = -1; dy = 0; }
                if (dir === 'right' && lastDir.x !== -1) { dx = 1; dy = 0; }
            });
        });

        document.addEventListener('keydown', handleKeydown);
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Show start overlay
        startOverlay.classList.add('active');
        draw();
    </script>
</body>
</html>
