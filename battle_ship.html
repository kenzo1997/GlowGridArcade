<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phaser Battleship</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a1a2e; font-family: sans-serif; }
    </style>
</head>
<body>

<script>
const GRID_SIZE = 8; // 8x8 grid
const CELL = 45;
const OFFSET_X = 50;
const OFFSET_Y = 100;

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    backgroundColor: '#16213e',
    scene: { create: create }
};

const game = new Phaser.Game(config);

function create() {
    this.playerBoard = Array(GRID_SIZE).fill(0).map(() => Array(GRID_SIZE).fill(0));
    this.cpuBoard = Array(GRID_SIZE).fill(0).map(() => Array(GRID_SIZE).fill(0));
    this.playerHits = Array(GRID_SIZE).fill(0).map(() => Array(GRID_SIZE).fill(0));
    this.cpuHits = Array(GRID_SIZE).fill(0).map(() => Array(GRID_SIZE).fill(0));
    
    this.gameState = 'PLACEMENT'; // PLACEMENT or BATTLE
    this.playerShipsPlaced = 0;
    this.totalShipCells = 10; // Total segments to sink
    this.playerSunk = 0;
    this.cpuSunk = 0;

    // UI Text
    this.statusText = this.add.text(400, 40, 'PLACE YOUR SHIPS (Click 10 squares)', { fontSize: '24px', fill: '#e94560' }).setOrigin(0.5);
    this.add.text(OFFSET_X + 100, 80, 'YOUR FLEET', { fontSize: '16px', fill: '#fff' }).setOrigin(0.5);
    this.add.text(OFFSET_X + 500, 80, 'ENEMY RADAR', { fontSize: '16px', fill: '#fff' }).setOrigin(0.5);

    // Draw Grids
    this.playerGridSprites = createGrid.call(this, OFFSET_X, OFFSET_Y, true);
    this.cpuGridSprites = createGrid.call(this, OFFSET_X + 400, OFFSET_Y, false);

    // Randomize CPU ships
    placeCpuShips.call(this);
}

function createGrid(offsetX, offsetY, isPlayer) {
    let sprites = [];
    for (let r = 0; r < GRID_SIZE; r++) {
        sprites[r] = [];
        for (let c = 0; c < GRID_SIZE; c++) {
            let cell = this.add.rectangle(offsetX + c * CELL, offsetY + r * CELL, CELL - 2, CELL - 2, 0x0f3460)
                .setOrigin(0)
                .setInteractive({ useHandCursor: true });

            cell.on('pointerdown', () => handleCellClick.call(this, r, c, isPlayer));
            sprites[r][c] = cell;
        }
    }
    return sprites;
}

function handleCellClick(r, c, isPlayerCell) {
    if (this.gameState === 'PLACEMENT' && isPlayerCell) {
        if (this.playerBoard[r][c] === 0 && this.playerShipsPlaced < this.totalShipCells) {
            this.playerBoard[r][c] = 1;
            this.playerGridSprites[r][c].setFillStyle(0x2ecc71);
            this.playerShipsPlaced++;
            if (this.playerShipsPlaced === this.totalShipCells) {
                this.gameState = 'BATTLE';
                this.statusText.setText('BATTLE START! ATTACK THE RADAR');
            }
        }
    } else if (this.gameState === 'BATTLE' && !isPlayerCell) {
        if (this.playerHits[r][c] !== 0) return; // Already clicked

        if (this.cpuBoard[r][c] === 1) {
            this.cpuGridSprites[r][c].setFillStyle(0xe94560); // HIT
            this.playerHits[r][c] = 'H';
            this.cpuSunk++;
            this.cameras.main.shake(100, 0.005);
        } else {
            this.cpuGridSprites[r][c].setFillStyle(0xffffff, 0.2); // MISS
            this.playerHits[r][c] = 'M';
        }

        if (this.cpuSunk === this.totalShipCells) {
            endGame.call(this, "VICTORY! ENEMY SUNK");
        } else {
            this.time.delayedCall(500, cpuTurn, [], this);
        }
    }
}

function cpuTurn() {
    let r, c;
    do {
        r = Phaser.Math.Between(0, GRID_SIZE - 1);
        c = Phaser.Math.Between(0, GRID_SIZE - 1);
    } while (this.cpuHits[r][c] !== 0);

    if (this.playerBoard[r][c] === 1) {
        this.playerGridSprites[r][c].setFillStyle(0xffa500); // Enemy hit you
        this.cpuHits[r][c] = 'H';
        this.playerSunk++;
    } else {
        this.playerGridSprites[r][c].setAlpha(0.5); // Enemy missed
        this.cpuHits[r][c] = 'M';
    }

    if (this.playerSunk === this.totalShipCells) {
        endGame.call(this, "DEFEAT! FLEET DESTROYED");
    }
}

function placeCpuShips() {
    let placed = 0;
    while (placed < this.totalShipCells) {
        let r = Phaser.Math.Between(0, GRID_SIZE - 1);
        let c = Phaser.Math.Between(0, GRID_SIZE - 1);
        if (this.cpuBoard[r][c] === 0) {
            this.cpuBoard[r][c] = 1;
            placed++;
        }
    }
}

function endGame(msg) {
    this.gameState = 'GAMEOVER';
    this.statusText.setText(msg);
    this.add.text(400, 500, 'CLICK TO RESTART', { fontSize: '20px', fill: '#fff' }).setOrigin(0.5)
        .setInteractive().on('pointerdown', () => this.scene.restart());
}

</script>
</body>
</html>
