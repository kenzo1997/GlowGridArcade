<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phaser Deluxe Frogger</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #111; }
    </style>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO,
    width: 500,
    height: 600,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { create: create, update: update }
};

const game = new Phaser.Game(config);

function create() {
    // 1. Environment Layers
    this.add.rectangle(250, 300, 500, 600, 0x000000); // Background
    this.add.rectangle(250, 450, 500, 200, 0x333333); // Road
    this.add.rectangle(250, 150, 500, 200, 0x0000ff, 0.5); // Water
    this.add.rectangle(250, 575, 500, 50, 0x27ae60); // Start
    this.add.rectangle(250, 25, 500, 50, 0x27ae60); // Goal

    // 2. Groups
    this.cars = this.physics.add.group();
    this.logs = this.physics.add.group();

    // 3. The Frog
    this.frog = this.add.circle(250, 575, 15, 0x2ecc71);
    this.physics.add.existing(this.frog);
    this.frog.body.setCollideWorldBounds(true);

    // 4. Spawning Logic
    const spawnRow = (y, group, color, speed, width) => {
        this.time.addEvent({
            delay: Math.abs(200000 / speed),
            callback: () => {
                if (this.gameOver) return;
                const x = speed > 0 ? -50 : 550;
                const item = this.add.rectangle(x, y, width, 30, color);
                group.add(item);
                item.body.setVelocityX(speed);
            },
            loop: true
        });
    };

    // Rows of Obstacles
    spawnRow(500, this.cars, 0xe74c3c, 150, 40);  // Car Fast
    spawnRow(450, this.cars, 0xf1c40f, -100, 60); // Car Slow
    spawnRow(400, this.cars, 0x9b59b6, 120, 40);  // Car Med
    
    spawnRow(250, this.logs, 0x8e44ad, -80, 100); // Log
    spawnRow(150, this.logs, 0x8e44ad, 100, 150); // Log Long
    spawnRow(50, this.logs, 0x8e44ad, -120, 80);  // Log Fast

    // 5. Controls
    this.cursors = this.input.keyboard.createCursorKeys();
    this.input.on('pointerdown', () => moveFrog.call(this, 0, -50)); // Click to jump up

    // 6. State
    this.gameOver = false;
    this.onLog = false;
}

function update() {
    if (this.gameOver) return;

    // Movement (Snap Grid)
    if (Phaser.Input.Keyboard.JustDown(this.cursors.up)) moveFrog.call(this, 0, -50);
    if (Phaser.Input.Keyboard.JustDown(this.cursors.down)) moveFrog.call(this, 0, 50);
    if (Phaser.Input.Keyboard.JustDown(this.cursors.left)) moveFrog.call(this, -50, 0);
    if (Phaser.Input.Keyboard.JustDown(this.cursors.right)) moveFrog.call(this, 50, 0);

    // Win Condition
    if (this.frog.y < 50) {
        endGame.call(this, "YOU MADE IT!", 0x2ecc71);
    }

    // Collision: Cars
    this.physics.overlap(this.frog, this.cars, () => {
        endGame.call(this, "SQUASHED!", 0xe74c3c);
    });

    // Collision: Water/Logs
    this.onLog = false;
    this.physics.overlap(this.frog, this.logs, (f, log) => {
        this.onLog = true;
        this.frog.x += log.body.velocity.x * 0.016; // Ride the log
    });

    if (this.frog.y < 300 && this.frog.y > 50 && !this.onLog) {
        endGame.call(this, "DROWNED!", 0x3498db);
    }
}

function moveFrog(x, y) {
    this.frog.x += x;
    this.frog.y += y;
    // Add a little scale "jump" effect
    this.tweens.add({ targets: this.frog, scale: 1.5, duration: 50, yoyo: true });
}

function endGame(msg, color) {
    this.gameOver = true;
    this.cars.setVelocityX(0);
    this.logs.setVelocityX(0);
    
    this.add.text(250, 300, msg, { 
        fontSize: '48px', fontWeight: '900', fill: '#fff', 
        backgroundColor: '#000', padding: 20 
    }).setOrigin(0.5);

    this.add.text(250, 380, "Click to Restart", { fontSize: '20px', fill: '#fff' }).setOrigin(0.5);
    
    this.input.once('pointerdown', () => this.scene.restart());
}
</script>

</body>
</html>
